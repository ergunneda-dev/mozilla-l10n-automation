# Weekly l10n completeness report
#
# Clones firefox-l10n (translations) AND firefox-l10n-source (canonical en-US),
# merges the latter into firefox-l10n/en-US/, then runs completeness_report.py.
# Result: a CSV uploaded as a workflow artifact (downloadable from the run page).

name: Weekly l10n completeness report

on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays at 06:00 UTC
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out scripts repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install fluent.syntax
        run: pip install fluent.syntax

      - name: Clone firefox-l10n (translations) into ./firefox-l10n
        uses: actions/checkout@v4
        with:
          repository: mozilla-l10n/firefox-l10n
          path: firefox-l10n
          fetch-depth: 1

      - name: Clone firefox-l10n-source (canonical en-US) into ./firefox-l10n-source
        uses: actions/checkout@v4
        with:
          repository: mozilla-l10n/firefox-l10n-source
          path: firefox-l10n-source
          fetch-depth: 1

      - name: Merge en-US source into firefox-l10n/en-US/
        run: |
          mkdir -p firefox-l10n/en-US
          cp -r firefox-l10n-source/. firefox-l10n/en-US/

      - name: Run completeness report
        run: |
          python scripts/completeness_report.py firefox-l10n --out report.csv

      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: completeness-report
          path: report.csv
          retention-days: 30
