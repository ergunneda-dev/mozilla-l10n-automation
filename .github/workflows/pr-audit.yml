# Per-PR full audit
#
# Triggers when a PR touches the audit scripts or any workflow file.
# Clones mozilla-l10n/firefox-l10n + mozilla-l10n/firefox-l10n-source at
# PR time, runs the completeness report across all locales, and posts a
# summary comment on the PR.
#
# Use case: I'm changing the audit logic in scripts/. Before merge, this
# workflow proves the change still produces sensible results against real
# Mozilla data — not just sample-data.

name: PR audit

on:
  pull_request:
    paths:
      - "scripts/**"
      - ".github/workflows/**"
      - "sample-data/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install fluent.syntax
        run: pip install fluent.syntax

      - name: Clone firefox-l10n (translations)
        uses: actions/checkout@v4
        with:
          repository: mozilla-l10n/firefox-l10n
          path: firefox-l10n
          fetch-depth: 1

      - name: Clone firefox-l10n-source (en-US canonical)
        uses: actions/checkout@v4
        with:
          repository: mozilla-l10n/firefox-l10n-source
          path: firefox-l10n-source
          fetch-depth: 1

      - name: Merge en-US source into firefox-l10n/en-US/
        run: |
          mkdir -p firefox-l10n/en-US
          cp -r firefox-l10n-source/. firefox-l10n/en-US/

      - name: Run completeness report
        run: |
          python scripts/completeness_report.py firefox-l10n --out pr-report.csv

      - name: Build PR comment
        run: |
          {
            echo "## PR audit results"
            echo ""
            echo "Real-data completeness run against all 157 locales of \`mozilla-l10n/firefox-l10n\` at PR time."
            echo ""
            total_locales=$(($(wc -l < pr-report.csv) - 1))
            at_100=$(awk -F, 'NR>1 && $6==100 {c++} END {print c+0}' pr-report.csv)
            echo "**Summary:** $total_locales locales scanned, **$at_100** at 100% completeness."
            echo ""
            echo "### Top 5 most-complete (excluding 100%)"
            echo "| Locale | % | Translated | Missing | Empty |"
            echo "|---|---|---|---|---|"
            awk -F, 'NR>1 && $6<100 {print $0}' pr-report.csv \
              | sort -t, -k6,6 -nr \
              | head -5 \
              | awk -F, '{printf "| %s | %.2f%% | %d | %d | %d |\n", $1, $6, $3, $4, $5}'
            echo ""
            echo "### Bottom 5 (excluding 0%)"
            echo "| Locale | % | Translated | Missing | Empty |"
            echo "|---|---|---|---|---|"
            awk -F, 'NR>1 && $6>0 {print $0}' pr-report.csv \
              | sort -t, -k6,6 -n \
              | head -5 \
              | awk -F, '{printf "| %s | %.2f%% | %d | %d | %d |\n", $1, $6, $3, $4, $5}'
            echo ""
            echo "_Reproduces the methodology of [completeness-analysis-2026-05-20.md](../blob/main/completeness-analysis-2026-05-20.md). Compare against that baseline to see what's drifted._"
          } > pr-comment.md

      - name: Post comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("pr-comment.md", "utf8");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body,
            });

      - name: Upload full CSV as artifact
        uses: actions/upload-artifact@v4
        with:
          name: completeness-report-pr-${{ github.event.pull_request.number }}
          path: pr-report.csv
          retention-days: 14